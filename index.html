<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GETTICKET PRO</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root {
  --primary:#0a7f5a;
  --bg:#f5f5f5;
  --dark:#111827;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  transition:.3s;
}

.dark {
  background:var(--dark);
  color:#fff;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#fff;
}

.dark .nav { background:#1f2937; }

.btn {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:var(--primary);
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:15px;
  transition:.3s;
}

.dark .card { background:#374151; }

.card:hover {
  transform:scale(1.03);
}

.hero {
  background:linear-gradient(to right, #0a7f5a, #065f46);
  color:white;
  padding:40px;
  border-radius:20px;
}

.center {
  display:flex;
  justify-content:center;
  align-items:center;
}

.hidden { display:none; }

input {
  padding:10px;
  margin:5px 0;
  width:100%;
}
</style>
</head>

<body>

<div class="nav">
  <b>GETTICKET</b>
  <div>
    <a href="#/">Home</a>
    <a href="#/tickets">Tickets</a>
    <a href="#/admin">Admin</a>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="logout()" id="logoutBtn" class="btn hidden">Logout</button>
  </div>
</div>

<main id="app"></main>

<script>
const API = "http://localhost:8000";

/* ================= AUTH ================= */
let accessToken = localStorage.getItem("access");

function setToken(t){
  accessToken = t;
  localStorage.setItem("access", t);
}

function logout(){
  accessToken = null;
  localStorage.clear();
  location.hash="#/";
}

/* ================= THEME ================= */
(function(){
  const saved = localStorage.getItem("theme");
  if(saved==="dark") document.body.classList.add("dark");
})();

function toggleTheme(){
  const dark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", dark?"dark":"light");
}

/* ================= API ================= */
async function api(url, options={}){
  try{
    const res = await fetch(API+url,{
      ...options,
      credentials:"include",
      headers:{
        "Content-Type":"application/json",
        ...(accessToken && {Authorization:"Bearer "+accessToken})
      }
    });

    if(res.status===401){
      await refresh();
      return api(url, options);
    }

    if(!res.ok) throw new Error("Error");

    return res.json();

  }catch(e){
    console.error(e);
    alert("Network error");
  }
}

/* ================= REFRESH ================= */
async function refresh(){
  const res = await fetch(API+"/refresh",{method:"POST",credentials:"include"});
  const data = await res.json();
  setToken(data.access_token);
}

/* ================= ROUTER ================= */
function router(){
  const hash = location.hash || "#/";

  if(hash.startsWith("#/login")) return Login();
  if(hash.startsWith("#/tickets")) return Tickets();
  if(hash.startsWith("#/admin")) return Admin();
  if(hash.startsWith("#/event")){
    const id = new URLSearchParams(hash.split("?")[1]).get("id");
    return Event(id);
  }

  return Home();
}

window.addEventListener("hashchange", router);

/* ================= PAGES ================= */

async function Home(){
  app.innerHTML = `
    <div class="hero">
      <h1>Discover Events</h1>
      <p>Instant booking with M-Pesa</p>
    </div>
    <h2>Events</h2>
    <div class="grid" id="events">Loading...</div>
  `;

  const data = await api("/events");

  document.getElementById("events").innerHTML =
    data.items.map(e=>`
      <div class="card">
        <h3>${e.title}</h3>
        <p>${e.location}</p>
        <button class="btn" onclick="goEvent(${e.id})">View</button>
      </div>
    `).join("");
}

function goEvent(id){
  location.hash="#/event?id="+id;
}

/* ================= EVENT ================= */
async function Event(id){
  app.innerHTML="Loading...";

  const e = await api("/events/"+id);

  app.innerHTML = `
    <h1>${e.title}</h1>
    <p>${e.location}</p>

    <button class="btn" onclick="pay(${id})">Pay</button>
    <p id="status"></p>
  `;
}

async function pay(id){
  const phone = prompt("2547XXXXXXXX");

  const res = await api("/payments/stk-push",{
    method:"POST",
    body:JSON.stringify({event_id:id, phone})
  });

  const statusEl = document.getElementById("status");
  statusEl.innerText="Waiting for payment...";

  const interval = setInterval(async()=>{
    const p = await api("/payments/"+res.payment_id);

    if(p.status==="success"){
      clearInterval(interval);
      statusEl.innerText="Payment successful!";
      location.hash="#/tickets";
    }
  },3000);
}

/* ================= LOGIN ================= */
function Login(){
  app.innerHTML = `
    <h1>Login</h1>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn" onclick="doLogin()">Login</button>
  `;
}

async function doLogin(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("pass").value;

  const res = await api("/auth/login",{
    method:"POST",
    body:JSON.stringify({email,password})
  });

  setToken(res.access_token);
  location.hash="#/";
}

/* ================= TICKETS ================= */
async function Tickets(){
  if(!accessToken){
    location.hash="#/login";
    return;
  }

  app.innerHTML="Loading tickets...";

  const data = await api("/tickets/me");

  if(!data.items.length){
    app.innerHTML="<p>No tickets</p>";
    return;
  }

  const t = data.items[0];

  app.innerHTML = `
    <div class="center" style="height:80vh">
      <div class="card">
        <h2>${t.event.title}</h2>
        <canvas id="qr"></canvas>
        <p>${t.code}</p>
      </div>
    </div>
  `;

  QRCode.toCanvas(document.getElementById("qr"), t.code);
}

/* ================= ADMIN ================= */
async function Admin(){
  if(!accessToken){
    location.hash="#/login";
    return;
  }

  const data = await api("/admin/overview");

  app.innerHTML = `
    <h1>Dashboard</h1>
    <div class="grid">
      <div class="card">Events: ${data.total_events}</div>
      <div class="card">Tickets: ${data.total_tickets}</div>
      <div class="card">Revenue: ${data.total_revenue_kes}</div>
      <div class="card">Check-ins: ${data.checked_in}</div>
    </div>
  `;
}

/* ================= INIT ================= */
router();
</script>

</body>
</html>
